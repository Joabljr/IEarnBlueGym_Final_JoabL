<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Registration | The I Earn Blue Gym</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>The I Earn Blue Gym</h1>
    <nav>
        <ul>
            <li><a href="index.html" class="active">About Us</a></li>
            <li><a href="MembershipRegistration.html">Membership Registration</a></li>
            <li><a href="CreativityPage.html">Creative Page</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Membership Registration Form</h2>
    <p>Please fill out the form below to join our gym.</p>

    <form id="registrationForm">

        <!-- Full Name -->
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" placeholder="John Doe">

        <!-- Email -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="example@gmail.com">

        <!-- Phone -->
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" placeholder="123-456-7890">

        <!-- Age -->
        <label for="age">Age:</label>
        <input type="number" id="age" min="10" max="100">

        <!-- Membership Type -->
        <label for="membershipType">Membership Type:</label>
        <select id="membershipType">
            <option value="">-- Select Membership --</option>
            <option value="Basic">Basic</option>
            <option value="Standard">Standard</option>
            <option value="Premium">Premium</option>
        </select>

        <!-- Fitness Goals -->
        <label for="goals">Fitness Goals:</label>
        <textarea id="goals" rows="4" placeholder="Describe your goals..."></textarea>

        <!-- Extra Field #1 -->
        <label for="address">Home Address:</label>
        <input type="text" id="address" placeholder="123 Main St">

        <!-- Extra Field #2 -->
        <label for="emergency">Emergency Contact Name:</label>
        <input type="text" id="emergency" placeholder="Parent, spouse, etc.">

        <!-- Error Message Box -->
        <div id="errorMessages"></div>

        <!-- Submit Button -->
        <button type="submit">Submit Registration</button>

    </form>
</main>

<footer>
    <p>&copy; 2026 The I Earn Blue Gym. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
